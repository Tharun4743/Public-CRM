services:
  - type: web
    name: ps-crm
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: node test-server.js
    healthCheckPath: /api/health
    healthCheckGracePeriod: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
